# Shopify App Configuration
# This file defines the NeuroCommerce app for Shopify App Store

scopes = "write_products,read_products,write_orders,read_orders,write_customers,read_customers,write_cart_items,read_cart_items,write_discounts,read_discounts,write_webhooks,read_webhooks,write_fulfillments,read_fulfillments"

title = "NeuroCommerce - AI Shopping Assistant"
description = "Intelligent AI agents that boost conversions by guiding customers through the buying journey"

# OAuth redirect URIs
redirect_uris = [
  "https://neurocommerce.example.com/api/shopify/oauth/callback"
]

# API version
api_version = "2024-01"

# Admin UI configuration
admin_api_access_scopes = [
  "write_products",
  "read_products",
  "write_orders",
  "read_orders",
  "write_customers",
  "read_customers",
  "write_webhooks",
  "read_webhooks"
]

# Webhooks configuration - will be registered automatically
webhooks = [
  {
    topic = "orders/created",
    path = "/webhooks/orders/created"
  },
  {
    topic = "orders/updated",
    path = "/webhooks/orders/updated"
  },
  {
    topic = "checkouts/create",
    path = "/webhooks/checkouts/create"
  },
  {
    topic = "checkouts/update",
    path = "/webhooks/checkouts/update"
  },
  {
    topic = "customers/create",
    path = "/webhooks/customers/create"
  },
  {
    topic = "customers/update",
    path = "/webhooks/customers/update"
  },
  {
    topic = "app/uninstalled",
    path = "/webhooks/app/uninstalled"
  }
]

# Extension configuration for embedded app
extension_points = [
  {
    module = "SetupWizard",
    target = "admin.settings.apps.extension"
  },
  {
    module = "Dashboard",
    target = "admin.dashboard.extension"
  }
]

# Billing configuration (optional, enable if monetizing)
billing_plans = []

# Privacy and security
privacy_url = "https://neurocommerce.example.com/privacy"
support_url = "https://neurocommerce.example.com/support"
homepage_url = "https://neurocommerce.example.com"

# App metadata
categories = [
  "Sales and conversion optimization",
  "Customer service",
  "Analytics"
]

# Embedded experience settings
embedded_app_status = "enabled"
surface = "admin"

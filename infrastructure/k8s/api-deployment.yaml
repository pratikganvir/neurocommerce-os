apiVersion: v1
kind: Namespace
metadata:
  name: neurocommerce

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neurocommerce-config
  namespace: neurocommerce
data:
  environment: production
  api_host: api.neurocommerce.svc.cluster.local
  kafka_brokers: kafka:9092
  redis_url: redis://redis:6379/0

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: neurocommerce
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: neurocommerce/api:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: url
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: KAFKA_BROKERS
          value: kafka:9092
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: neurocommerce
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
